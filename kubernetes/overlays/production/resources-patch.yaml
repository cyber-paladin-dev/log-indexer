apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-indexer-api
spec:
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
spec:
  template:
    spec:
      containers:
        - name: opensearch
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
  volumeClaimTemplates:
    - metadata:
        name: opensearch-data
      spec:
        resources:
          requests:
            storage: 50Gi # Larger storage for production
