apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-indexer-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-indexer-api
  template:
    metadata:
      labels:
        app: log-indexer-api
    spec:
      containers:
        - name: api
          image: log-indexer-api:v1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: log-indexer-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: log-indexer-api-service
spec:
  type: LoadBalancer
  selector:
    app: log-indexer-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
